<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <style>
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border: 1px solid #f5c6cb;
            border-radius: 5px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>ログイン</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div>
          {% for category, message in messages %}
            <div class="message {{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form method="POST" action="/login">
        <label for="username">ユーザー名:</label>
        <input type="text" id="username" name="username" required aria-label="ユーザー名を入力してください">
        <br>
        <label for="password">パスワード:</label>
        <input type="password" id="password" name="password" required aria-label="パスワードを入力してください">
        <br>
        <button type="submit" aria-label="ログインボタン">ログイン</button>
    </form>
</body>
</html>
